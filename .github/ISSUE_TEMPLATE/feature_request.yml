name: Feature request
description: Propose new SDK behavior or a missing Chat surface
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to build?
      description: The Chat-app or AI-assistant behavior you want, not just the API call.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed SDK shape
      description: What would the ideal primitive look like in Node and/or Python?
  - type: textarea
    id: alternatives
    attributes:
      label: Workarounds you considered

name: Publish public packages

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Immutable version tag to publish (for example, v0.1.0-beta.1)
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - name: Require an exact version tag
        env:
          EXPECTED_REF: ${{ inputs.ref }}
        run: |
          NODE_VERSION="$(node -p "require('./packages/node/package.json').version")"
          PYTHON_VERSION="$(python -c "import tomllib; print(tomllib.load(open('packages/python/pyproject.toml', 'rb'))['project']['version'])")"
          test "${NODE_VERSION}" = "${PYTHON_VERSION}"
          test "${EXPECTED_REF}" = "v${NODE_VERSION}"
          git rev-parse --verify "refs/tags/${EXPECTED_REF}" >/dev/null
          test "$(git rev-parse HEAD)" = "$(git rev-list -n 1 "refs/tags/${EXPECTED_REF}")"
      - uses: pnpm/action-setup@v5
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Validate release contents
        run: pnpm release:check

  build-artifacts:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - uses: pnpm/action-setup@v5
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Set reproducible artifact timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Build and pack Node distribution
        working-directory: packages/node
        run: |
          pnpm build
          mkdir -p dist-package
          npm pack --pack-destination dist-package
      - name: Build Python distributions
        working-directory: packages/python
        run: |
          python -m pip install --disable-pip-version-check build==1.5.0
          python -m build --sdist --wheel --outdir dist
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: packages/python/dist/
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: node-package
          path: packages/node/dist-package/*.tgz
          if-no-files-found: error

  publish:
    needs: build-artifacts
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: actions/download-artifact@v5
        with:
          name: node-package
          path: node-package
      - uses: actions/download-artifact@v5
        with:
          name: python-dist
          path: python-dist
      - name: Check immutable npm artifact state
        id: npm-state
        run: node tools/release/registry-artifact-state.mjs npm node-package/*.tgz
      - name: Publish prevalidated npm package with OIDC
        if: steps.npm-state.outputs.publish == 'true'
        run: |
          VERSION="$(node -p "require('./packages/node/package.json').version")"
          if [[ "${VERSION}" == *-* ]]; then
            NPM_TAG="next"
          else
            NPM_TAG="latest"
          fi
          npm publish ./node-package/*.tgz --access public --tag "${NPM_TAG}"
      - name: Check immutable PyPI artifact state
        id: pypi-state
        run: node tools/release/registry-artifact-state.mjs pypi python-dist
      - name: Publish PyPI distributions with OIDC
        if: steps.pypi-state.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python-dist/
      - name: Verify both public registries expose the immutable version
        run: |
          for attempt in 1 2 3 4; do
            node tools/release/publish-readiness.mjs --live --require-local-version-published && exit 0
            sleep 15
          done
          exit 1
